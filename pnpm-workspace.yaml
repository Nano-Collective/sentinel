packages:
  - .

# Supply-chain hardening, mirroring the collective's posture (see nanocoder).
blockExoticSubdeps: true
minimumReleaseAge: 10080
trustPolicy: no-downgrade

# Only these dependencies are allowed to run install/build scripts. Nothing
# runs a postinstall unless it is named here.
allowBuilds:
  '@biomejs/biome': true
  esbuild: true

onlyBuiltDependencies:
  - '@biomejs/biome'
  - esbuild

auditConfig: {}
